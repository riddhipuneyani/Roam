# Render blueprint: API web service + static frontend.
# Secrets (sync: false) are set in the Render dashboard, never committed.
services:
  - type: web
    name: roam-api
    runtime: node
    rootDir: server
    plan: starter # Puppeteer needs more than the free tier's 512MB
    buildCommand: >-
      npm ci && npm run build && npx prisma migrate deploy &&
      npx @puppeteer/browsers install chrome@stable --path .chrome
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://roam-client.onrender.com # update after first deploy
      - key: DATABASE_URL
        sync: false # Supabase pooled string, keep ?pgbouncer=true
      - key: DIRECT_URL
        sync: false # Supabase direct string (migrations)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Low-memory instances may also need:
      # - key: PUPPETEER_EXTRA_ARGS
      #   value: --single-process

  - type: web
    name: roam-client
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://roam-api.onrender.com # update after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
